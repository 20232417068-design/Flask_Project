<!DOCTYPE html>
<html>
<head>
    <title>Stationary Store</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8fafc;
        }

        .navbar {
            background: #1f2937;
        }

        .navbar-brand {
            color: white;
            font-weight: bold;
        }

        .nav-btn {
            margin-left: 10px;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-primary {
            border-radius: 8px;
        }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<body>
    

<nav class="navbar navbar-expand-lg px-5">
    <a class="navbar-brand" href="/">🛒 Popular Store</a>

    <div class="ms-auto">
        <a href="/" class="btn btn-light nav-btn">Home</a>
        <a href="/login/" class="btn btn-success nav-btn">Login</a>
        <a href="/register/" class="btn btn-primary nav-btn">Register</a>
        <a href="/cart/" class="btn btn-warning nav-btn">Cart</a>
    </div>
</nav>
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-warning text-center m-2">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</script>
<style>
    body {
        background: linear-gradient(135deg, #e0f2fe, #f8fafc);
        font-family: 'Segoe UI', sans-serif;
    }

    /* NAVBAR */
    .navbar {
        background: linear-gradient(90deg, #1f2937, #111827);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .navbar-brand {
        color: white;
        font-weight: bold;
        font-size: 20px;
    }

    .nav-btn {
        margin-left: 10px;
        border-radius: 8px;
    }

    /* CARDS */
    .card {
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        transition: 0.3s;
        border: none;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    /* BUTTONS */
    .btn {
        border-radius: 10px;
        font-weight: 500;
    }

    /* HEADINGS */
    h2, h3 {
        font-weight: bold;
        color: #1f2937;
    }

    /* ALERT */
    .alert {
        border-radius: 10px;
        font-weight: 500;
    }
    /* CARD DESIGN */
.product-card {
    border-radius: 15px;
    transition: 0.3s;
    border: none;
    overflow: hidden;
    background: white;
}

/* HOVER EFFECT */
.product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* IMAGE BOX */
.img-box {
    height: 200px;
    background: #f9fafb;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
}

.img-box img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
}

/* TITLE */
.product-title {
    font-weight: 600;
    margin-bottom: 5px;
}

/* PRICE */
.price {
    color: #16a34a;
    font-size: 18px;
    font-weight: bold;
}

/* BUTTON */
.btn-cart {
    background: #16a34a;
    color: white;
    border-radius: 8px;
    width: 100%;
    transition: 0.3s;
}

.btn-cart:hover {
    background: #15803d;
}

/* LOGIN BUTTON */
.btn-login {
    background: #f59e0b;
    color: white;
    border-radius: 8px;
    width: 100%;
}

.btn-login:hover {
    background: #d97706;
}
.product-card {
    background: linear-gradient(145deg, #7ba6c3, #baaee3);
    border-radius: 15px;
}
.img-box {
    background: #5ea6d5;
    
}

/* CART CARD */
.cart-card {
    border-radius: 15px;
    background: rgb(199, 138, 138);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* HEADER */
.cart-header {
    background: linear-gradient(to right, #1f2937, #374151);
    color: rgb(205, 115, 115);
}

/* ROW HOVER */
.cart-row:hover {
    background: #f9fafb;
}

/* QUANTITY BOX */
.qty-box {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.qty {
    font-weight: bold;
    font-size: 16px;
}

/* REMOVE BUTTON */
.remove-btn {
    border-radius: 20px;
}

/* CHECKOUT BUTTON */
.checkout-btn {
    background: linear-gradient(to right, #2563eb, #1d4ed8);
    color: rgb(235, 155, 155);
    padding: 10px 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.checkout-btn:hover {
    background: linear-gradient(to right, #1d4ed8, #1e40af);
}
body {
    background: #6b88ae;   /* light blue page */
}


.cart-title {
    font-size: 30px;
    font-weight: 700;
    color: #050b16;
}

.cart-icon {
    font-size: 36px;
}
.cart-card {
    background: linear-gradient(135deg, #94caef, #f8fafc);
    border-radius: 20px;
    padding: 25px;
}
/* MAIN CARD */
.checkout-card {
    background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* TITLE */
.checkout-title {
    font-size: 28px;
    font-weight: 700;
    color: #111827;
}

/* TABLE HEADER */
.checkout-header {
    background: linear-gradient(to right, #1f2937, #374151);
    color: white;
}

/* INPUT STYLE */
.custom-input {
    border-radius: 10px;
    padding: 12px;
    border: 1px solid #d1d5db;
    transition: 0.3s;
}

.custom-input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 5px rgba(37,99,235,0.5);
}

/* BUTTON */
.place-order-btn {
    width: 100%;
    background: linear-gradient(to right, #16a34a, #15803d);
    color: white;
    padding: 12px;
    border-radius: 10px;
    font-weight: 600;
    transition: 0.3s;
}

.place-order-btn:hover {
    background: linear-gradient(to right, #1e5037, #166534);
}
body {
    background: linear-gradient(to right, #7f94b0, #a8bcd6);
}
/* SEARCH BOX */
.search-form {
    width: 50%;
}

.search-input {
    border-radius: 25px;
    padding: 10px 15px;
    border: 1px solid #d1d5db;
}

.search-input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 5px rgba(37,99,235,0.5);
}

/* BUTTON */
.search-btn {
    border-radius: 25px;
    padding: 10px 20px;
    background: #2563eb;
    color: white;
}

.search-btn:hover {
    background: #1d4ed8;
}
</style>
</body>
</html>
