{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        
        <div class="col-md-6 text-center">
            <div class="card p-3 shadow">
                <img src="{{ url_for('static', filename='images/' + product.image) }}"
                     class="img-fluid"
                     style="max-height:350px; object-fit: cover;">
            </div>
        </div>

        
        <div class="col-md-6">

            <h2 class="fw-bold">{{ product.name }}</h2>

            <p class="text-muted mt-2">{{ product.description }}</p>

            <h3 class="text-success mt-3">₹{{ product.price }}</h3>

            <p class="mt-3">⭐⭐⭐⭐☆ (4.2 Rating)</p>

            <ul class="mt-3">
                <li>High quality stainless steel</li>
                <li>Rust resistant</li>
                <li>Durable & long lasting</li>
            </ul>

            
            <div class="mt-4">
                <a href="/add_to_cart/{{ product.id }}" class="btn btn-success btn-lg">
                    🛒 Add to Cart
                </a>

                <a href="/products" class="btn btn-secondary btn-lg ms-2">
                    ← Back
                </a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
